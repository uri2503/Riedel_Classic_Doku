<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riedel Classics · E-Mail Vorlagen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Source+Sans+3:wght@300;400;600&display=swap');

:root {
  --black:#0d0d0d; --dark:#141414; --dark2:#1c1c1c; --dark3:#242424;
  --border:#2a2a2a; --steel:#5a5a5a; --silver:#9a9a9a; --white:#f0eeeb;
  --red:#c0392b; --red2:#e04030; --red-dim:rgba(192,57,43,0.1);
  --cream:#f7f4ee; --warm:#ede8df;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--white); font-family:'Source Sans 3',sans-serif; font-weight:300; min-height:100vh; }

/* Topbar */
.topbar {
  background:var(--dark); border-bottom:1px solid var(--border);
  padding:0 28px; height:52px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:50;
}
.topbar-logo { font-family:'Oswald',sans-serif; font-weight:600; font-size:1.05rem; letter-spacing:0.06em; }
.topbar-logo span { color:var(--red); font-weight:300; font-size:0.7rem; letter-spacing:0.2em; }

/* Layout */
.wrap { max-width:900px; margin:0 auto; padding:32px 24px 60px; display:grid; grid-template-columns:220px 1fr; gap:24px; }
@media(max-width:700px) { .wrap { grid-template-columns:1fr; } }

/* Sidebar nav */
.nav-panel { display:flex; flex-direction:column; gap:6px; }
.nav-label { font-size:0.62rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--red); margin-bottom:6px; margin-top:16px; }
.nav-label:first-child { margin-top:0; }
.nav-btn {
  background:var(--dark2); border:1px solid var(--border); border-radius:2px;
  padding:9px 12px; cursor:pointer; text-align:left;
  font-family:'Source Sans 3',sans-serif; font-size:0.8rem; color:var(--silver);
  transition:all 0.15s; line-height:1.4;
}
.nav-btn:hover { border-color:var(--red); color:var(--white); }
.nav-btn.active { border-color:var(--red); background:var(--red-dim); color:var(--white); }

/* Editor */
.editor-panel { display:flex; flex-direction:column; gap:16px; }

.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:500px) { .field-row { grid-template-columns:1fr; } }

.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--steel); }
.field input {
  background:var(--dark3); border:1px solid var(--border); border-radius:2px;
  color:var(--white); font-family:'Source Sans 3',sans-serif;
  font-size:0.85rem; padding:9px 12px; outline:none; transition:border-color 0.15s;
}
.field input:focus { border-color:var(--red); }

/* Preview card */
.preview-wrap {
  background:var(--dark2); border:1px solid var(--border); border-radius:3px;
  overflow:hidden;
}
.preview-header {
  background:var(--dark3); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
}
.preview-header span { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--red); }
.preview-actions { display:flex; gap:8px; }
.btn {
  background:none; border:1px solid var(--border); border-radius:2px;
  color:var(--silver); font-size:0.75rem; padding:6px 14px; cursor:pointer;
  font-family:'Source Sans 3',sans-serif; transition:all 0.15s; white-space:nowrap;
}
.btn:hover { border-color:var(--red); color:var(--white); }
.btn-red { background:var(--red); border-color:var(--red); color:white; font-weight:600; }
.btn-red:hover { background:var(--red2); }

/* Email preview */
.email-preview {
  padding:20px; background:var(--dark2);
}

/* The actual email styled as it would look */
.email-body {
  background:white; color:#1a1a1a; border-radius:3px; overflow:hidden;
  max-width:560px; margin:0 auto;
  font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:1.6;
}
.email-header-band {
  background:linear-gradient(135deg, #888 0%, #c0c0c0 40%, #e8e8e8 100%);
  padding:16px 28px; position:relative;
}
.email-header-band::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:#c0392b;
}
.email-header-band img { height:28px; object-fit:contain; }
.email-content { padding:28px; }
.email-greeting { font-size:15px; margin-bottom:16px; color:#1a1a1a; }
.email-intro { color:#555; margin-bottom:20px; font-size:14px; }
.email-code-box {
  background:#f7f4ee; border:1px solid #e0d8cc; border-radius:4px;
  padding:20px; text-align:center; margin:20px 0;
}
.email-code-label { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#888; margin-bottom:8px; }
.email-code { font-size:22px; font-weight:700; letter-spacing:0.2em; color:#1a1a1a; font-family:monospace; }
.email-code-expiry { font-size:11px; color:#aaa; margin-top:6px; }
.email-cta-wrap { text-align:center; margin:24px 0; }
.email-cta {
  display:inline-block; background:#c0392b; color:white;
  padding:12px 28px; border-radius:3px; text-decoration:none;
  font-size:14px; font-weight:600; letter-spacing:0.06em;
}
.email-steps { margin:20px 0; }
.email-step {
  display:flex; gap:12px; margin-bottom:12px; align-items:flex-start;
}
.email-step-num {
  background:#c0392b; color:white; border-radius:50%;
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.email-step-text { font-size:13px; color:#555; }
.email-step-text strong { color:#1a1a1a; }
.email-divider { border:none; border-top:1px solid #e0d8cc; margin:20px 0; }
.email-closing { color:#555; font-size:13px; margin-bottom:16px; }
.email-sig { color:#1a1a1a; font-size:14px; }
.email-sig-company { color:#c0392b; font-size:12px; letter-spacing:0.06em; }
.email-footer {
  background:#f7f4ee; border-top:1px solid #e0d8cc;
  padding:14px 28px; font-size:11px; color:#aaa; text-align:center; line-height:1.7;
}
.email-footer a { color:#c0392b; text-decoration:none; }

/* Subject line display */
.subject-bar {
  background:var(--dark3); border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; gap:10px;
}
.subject-bar .slabel { font-size:0.68rem; color:var(--steel); letter-spacing:0.1em; text-transform:uppercase; min-width:50px; }
.subject-bar .sval { font-size:0.85rem; color:var(--white); }

/* Notification */
.notif {
  position:fixed; bottom:20px; right:20px; z-index:200;
  background:var(--dark2); border:1px solid var(--border); border-radius:3px;
  padding:10px 16px; font-size:0.8rem; color:var(--silver);
  transform:translateY(20px); opacity:0; transition:all 0.3s; pointer-events:none;
}
.notif.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>

<div class="notif" id="notif"></div>

<div class="topbar">
  <div class="topbar-logo">Riedel <span>| classics</span></div>
  <span style="font-size:0.72rem;color:var(--steel)">E-Mail Vorlagen</span>
</div>

<div class="wrap">

  <!-- Nav -->
  <div class="nav-panel">
    <div class="nav-label">Vorlagen</div>
    <button class="nav-btn active" onclick="switchTemplate('portal', this)">
      🔗 Portalzugang<br>
      <span style="font-size:0.7rem;color:var(--steel)">Dokumentation freischalten</span>
    </button>
    <button class="nav-btn" onclick="switchTemplate('fertig', this)">
      🚗 Fahrzeug fertig<br>
      <span style="font-size:0.7rem;color:var(--steel)">Übergabe ankündigen</span>
    </button>
    <button class="nav-btn" onclick="switchTemplate('zwischenbericht', this)">
      📸 Zwischenbericht<br>
      <span style="font-size:0.7rem;color:var(--steel)">Fortschritt teilen</span>
    </button>

    <div class="nav-label">Felder</div>
    <div class="field">
      <label>Kundenname</label>
      <input id="fName" value="Michael Edig" oninput="renderPreview()">
    </div>
    <div class="field" style="margin-top:8px">
      <label>Fahrzeug</label>
      <input id="fVehicle" value="Mercedes W113 230SL" oninput="renderPreview()">
    </div>
    <div class="field" style="margin-top:8px">
      <label>Zugangscode</label>
      <input id="fCode" value="RC-HPAR-82DR" oninput="renderPreview()">
    </div>
    <div class="field" style="margin-top:8px">
      <label>Gültig bis</label>
      <input id="fExpiry" value="02. Juli 2026" oninput="renderPreview()">
    </div>
    <div class="field" style="margin-top:8px">
      <label>Ihr Name</label>
      <input id="fSender" value="U. Riedel" oninput="renderPreview()">
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-panel">
    <div class="preview-wrap">
      <div class="preview-header">
        <span id="templateLabel">Portal-Zugang</span>
        <div class="preview-actions">
          <button class="btn" onclick="copyText()">📋 Text kopieren</button>
          <button class="btn btn-red" onclick="openMail()">✉ In Mail öffnen</button>
        </div>
      </div>
      <div class="subject-bar">
        <span class="slabel">Betreff</span>
        <span class="sval" id="subjectLine">—</span>
      </div>
      <div class="email-preview">
        <div class="email-body" id="emailBody"></div>
      </div>
    </div>
  </div>

</div>

<script>
const LOGO = 'https://uri2503.github.io/Riedel_Classic_Doku/Logo_classics_6-cm.png';
const PORTAL_URL = 'https://uri2503.github.io/Riedel_Classic_Doku/portal.html';

let currentTemplate = 'portal';

const templates = {
  portal: {
    label: 'Portal-Zugang',
    subject: () => `Ihre Restaurationsdokumentation – ${v('fVehicle')} | Riedel Classics`,
    body: () => `
      <div class="email-header-band">
        <img src="${LOGO}" alt="Riedel Classics" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\\'font-family:sans-serif;font-weight:700;font-size:18px;color:white\\'>Riedel classics</span>'">
      </div>
      <div class="email-content">
        <p class="email-greeting">Sehr geehrter Herr/Frau ${v('fName')},</p>
        <p class="email-intro">
          Ihre Restauration des <strong>${v('fVehicle')}</strong> ist abgeschlossen. 
          Wir haben für Sie eine ausführliche Fotodokumentation aller Restaurationsphasen erstellt — 
          von der Annahme bis zur Übergabe.
        </p>
        <p class="email-intro">
          Sie können Ihre persönliche Dokumentation jetzt online ansehen und als PDF herunterladen:
        </p>
        <div class="email-code-box">
          <div class="email-code-label">Ihr persönlicher Zugangscode</div>
          <div class="email-code">${v('fCode')}</div>
          <div class="email-code-expiry">Gültig bis ${v('fExpiry')}</div>
        </div>
        <div class="email-cta-wrap">
          <a href="${PORTAL_URL}" class="email-cta">Dokumentation öffnen</a>
        </div>
        <div class="email-steps">
          <div class="email-step">
            <div class="email-step-num">1</div>
            <div class="email-step-text"><strong>Link öffnen:</strong> ${PORTAL_URL}</div>
          </div>
          <div class="email-step">
            <div class="email-step-num">2</div>
            <div class="email-step-text"><strong>Code eingeben:</strong> ${v('fCode')}</div>
          </div>
          <div class="email-step">
            <div class="email-step-num">3</div>
            <div class="email-step-text"><strong>Dokumentation ansehen</strong> und als PDF herunterladen</div>
          </div>
        </div>
        <hr class="email-divider">
        <p class="email-closing">
          Wir hoffen, dass Ihnen die Dokumentation Freude macht und Sie die Qualität unserer Arbeit 
          in jedem Detail nachvollziehen können. Bei Fragen stehen wir Ihnen jederzeit gerne zur Verfügung.
        </p>
        <p class="email-closing">Mit freundlichen Grüßen</p>
        <p class="email-sig">${v('fSender')}<br>
        <span class="email-sig-company">RIEDEL CLASSICS · ...mit Liebe zum Detail</span></p>
      </div>
      <div class="email-footer">
        Riedel Classics · <a href="mailto:u.riedel@riedel-classics.de">u.riedel@riedel-classics.de</a><br>
        Dieser Zugangscode ist persönlich und bis ${v('fExpiry')} gültig.
      </div>`
  },

  fertig: {
    label: 'Fahrzeug fertig',
    subject: () => `Ihr ${v('fVehicle')} ist fertig – Terminvereinbarung Übergabe | Riedel Classics`,
    body: () => `
      <div class="email-header-band">
        <img src="${LOGO}" alt="Riedel Classics" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\\'font-family:sans-serif;font-weight:700;font-size:18px;color:white\\'>Riedel classics</span>'">
      </div>
      <div class="email-content">
        <p class="email-greeting">Sehr geehrter Herr/Frau ${v('fName')},</p>
        <p class="email-intro">
          wir freuen uns, Ihnen mitteilen zu dürfen, dass Ihr <strong>${v('fVehicle')}</strong> 
          die Restauration erfolgreich abgeschlossen hat und zur Übergabe bereitsteht.
        </p>
        <p class="email-intro">
          Ihr Fahrzeug wurde mit größter Sorgfalt restauriert. Alle durchgeführten Arbeiten 
          wurden fotografisch dokumentiert — diese Dokumentation übergeben wir Ihnen zusammen 
          mit dem Fahrzeug.
        </p>
        <hr class="email-divider">
        <p class="email-intro">
          Bitte nehmen Sie Kontakt mit uns auf, um einen Übergabetermin zu vereinbaren.
          Wir freuen uns darauf, Ihnen Ihr Fahrzeug persönlich zu präsentieren.
        </p>
        <div class="email-cta-wrap">
          <a href="mailto:u.riedel@riedel-classics.de?subject=Übergabetermin ${v('fVehicle')}" class="email-cta">Termin vereinbaren</a>
        </div>
        <hr class="email-divider">
        <p class="email-closing">Mit freundlichen Grüßen</p>
        <p class="email-sig">${v('fSender')}<br>
        <span class="email-sig-company">RIEDEL CLASSICS · ...mit Liebe zum Detail</span></p>
      </div>
      <div class="email-footer">
        Riedel Classics · <a href="mailto:u.riedel@riedel-classics.de">u.riedel@riedel-classics.de</a>
      </div>`
  },

  zwischenbericht: {
    label: 'Zwischenbericht',
    subject: () => `Zwischenbericht Restauration ${v('fVehicle')} | Riedel Classics`,
    body: () => `
      <div class="email-header-band">
        <img src="${LOGO}" alt="Riedel Classics" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\\'font-family:sans-serif;font-weight:700;font-size:18px;color:white\\'>Riedel classics</span>'">
      </div>
      <div class="email-content">
        <p class="email-greeting">Sehr geehrter Herr/Frau ${v('fName')},</p>
        <p class="email-intro">
          wir möchten Sie über den aktuellen Stand der Restauration Ihres 
          <strong>${v('fVehicle')}</strong> informieren.
        </p>
        <p class="email-intro">
          Die Arbeiten liegen im Plan. Wir haben für Sie aktuelle Fotos des Restaurationsfortschritts 
          in Ihrem persönlichen Portal bereitgestellt:
        </p>
        <div class="email-code-box">
          <div class="email-code-label">Ihr persönlicher Zugangscode</div>
          <div class="email-code">${v('fCode')}</div>
          <div class="email-code-expiry">Gültig bis ${v('fExpiry')}</div>
        </div>
        <div class="email-cta-wrap">
          <a href="${PORTAL_URL}" class="email-cta">Fortschritt ansehen</a>
        </div>
        <hr class="email-divider">
        <p class="email-closing">
          Bei Fragen zum Restaurationsfortschritt stehen wir Ihnen jederzeit zur Verfügung.
        </p>
        <p class="email-closing">Mit freundlichen Grüßen</p>
        <p class="email-sig">${v('fSender')}<br>
        <span class="email-sig-company">RIEDEL CLASSICS · ...mit Liebe zum Detail</span></p>
      </div>
      <div class="email-footer">
        Riedel Classics · <a href="mailto:u.riedel@riedel-classics.de">u.riedel@riedel-classics.de</a><br>
        Dieser Zugangscode ist persönlich und bis ${v('fExpiry')} gültig.
      </div>`
  }
};

function v(id) {
  return document.getElementById(id)?.value || '';
}

function switchTemplate(name, btn) {
  currentTemplate = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPreview();
}

function renderPreview() {
  const t = templates[currentTemplate];
  document.getElementById('templateLabel').textContent = t.label;
  document.getElementById('subjectLine').textContent = t.subject();
  document.getElementById('emailBody').innerHTML = t.body();
}

function getPlainText() {
  const t = templates[currentTemplate];
  const name = v('fName'), vehicle = v('fVehicle'), code = v('fCode');
  const expiry = v('fExpiry'), sender = v('fSender');

  if (currentTemplate === 'portal') {
    return `Sehr geehrter Herr/Frau ${name},\n\nIhre Restauration des ${vehicle} ist abgeschlossen. Wir haben für Sie eine ausführliche Fotodokumentation aller Restaurationsphasen erstellt.\n\nSie können Ihre Dokumentation online ansehen und als PDF herunterladen:\n\nPortal: ${PORTAL_URL}\nZugangscode: ${code}\nGültig bis: ${expiry}\n\nSo geht's:\n1. Link öffnen: ${PORTAL_URL}\n2. Code eingeben: ${code}\n3. Dokumentation ansehen und als PDF herunterladen\n\nBei Fragen stehen wir Ihnen jederzeit gerne zur Verfügung.\n\nMit freundlichen Grüßen\n${sender}\nRiedel Classics · ...mit Liebe zum Detail`;
  } else if (currentTemplate === 'fertig') {
    return `Sehr geehrter Herr/Frau ${name},\n\nwir freuen uns, Ihnen mitteilen zu dürfen, dass Ihr ${vehicle} die Restauration erfolgreich abgeschlossen hat und zur Übergabe bereitsteht.\n\nBitte nehmen Sie Kontakt mit uns auf, um einen Übergabetermin zu vereinbaren.\n\nMit freundlichen Grüßen\n${sender}\nRiedel Classics · ...mit Liebe zum Detail`;
  } else {
    return `Sehr geehrter Herr/Frau ${name},\n\nwir möchten Sie über den aktuellen Stand der Restauration Ihres ${vehicle} informieren.\n\nAktuelle Fotos finden Sie in Ihrem Portal:\nPortal: ${PORTAL_URL}\nZugangscode: ${code}\nGültig bis: ${expiry}\n\nMit freundlichen Grüßen\n${sender}\nRiedel Classics · ...mit Liebe zum Detail`;
  }
}

function copyText() {
  navigator.clipboard.writeText(getPlainText()).then(() => notify('In Zwischenablage kopiert ✓'));
}

function openMail() {
  const t = templates[currentTemplate];
  const subject = encodeURIComponent(t.subject());
  const body = encodeURIComponent(getPlainText());
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// Init
renderPreview();
</script>
</body>
</html>
