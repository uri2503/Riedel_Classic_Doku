<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Riedel Classics · Dokumentation</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --black:#0d0d0d; --dark:#141414; --dark2:#1c1c1c; --dark3:#242424;
  --border:#2a2a2a; --steel:#5a5a5a; --silver:#9a9a9a; --white:#f0eeeb;
  --red:#c0392b; --red2:#e04030; --red-dim:rgba(192,57,43,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--black); color:var(--white); font-family:'Source Sans 3',sans-serif; font-weight:300; min-height:100vh; }

/* ── LOGIN ── */
.login-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
}
.login-box {
  background:var(--dark); border:1px solid var(--border); border-radius:3px;
  padding:40px 36px; width:min(380px,100%);
}
.login-logo {
  font-family:'Oswald',sans-serif; font-weight:600; font-size:1.6rem;
  letter-spacing:0.06em; color:var(--white); margin-bottom:4px;
}
.login-logo span { color:var(--red); font-weight:300; }
.login-sub { font-size:0.75rem; color:var(--steel); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:32px; }
.login-field { margin-bottom:14px; }
.login-field label { display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--steel); margin-bottom:6px; }
.login-field input {
  width:100%; background:var(--dark3); border:1px solid var(--border);
  border-radius:2px; color:var(--white); font-family:'Source Sans 3',sans-serif;
  font-size:0.9rem; padding:10px 12px; outline:none; transition:border-color 0.15s;
}
.login-field input:focus { border-color:var(--red); }
.btn-login {
  width:100%; background:var(--red); border:none; border-radius:2px;
  color:white; font-family:'Oswald',sans-serif; font-size:1rem;
  letter-spacing:0.1em; padding:12px; cursor:pointer; margin-top:8px;
  transition:background 0.15s;
}
.btn-login:hover { background:var(--red2); }
.login-err { font-size:0.78rem; color:var(--red2); margin-top:10px; display:none; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:50; background:var(--dark);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; height:50px; padding:0 20px; gap:12px;
}
.topbar-logo { font-family:'Oswald',sans-serif; font-weight:600; font-size:1.05rem; letter-spacing:0.06em; }
.topbar-logo span { color:var(--red); font-weight:300; font-size:0.7rem; letter-spacing:0.2em; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
.tbtn {
  background:none; border:1px solid var(--border); border-radius:2px;
  color:var(--silver); font-family:'Source Sans 3',sans-serif;
  font-size:0.75rem; padding:6px 14px; cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.tbtn:hover { border-color:var(--red); color:var(--white); }
.tbtn-red { background:var(--red); border-color:var(--red); color:white; font-weight:600; }
.tbtn-red:hover { background:var(--red2); border-color:var(--red2); }

/* ── LAYOUT ── */
.app-wrap { display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 50px); }
@media(max-width:700px) {
  .app-wrap { grid-template-columns:1fr; }
  .sidebar { position:fixed; left:0; top:50px; bottom:0; width:260px; z-index:40; transform:translateX(-100%); transition:transform 0.25s; }
  .sidebar.open { transform:translateX(0); box-shadow:4px 0 20px rgba(0,0,0,0.5); }
  .overlay { display:none; position:fixed; inset:0; top:50px; z-index:39; background:rgba(0,0,0,0.5); }
  .overlay.open { display:block; }
  .hamburger { display:flex !important; }
}
.hamburger { display:none; background:none; border:none; cursor:pointer; flex-direction:column; gap:5px; padding:4px; }
.hamburger span { display:block; width:20px; height:2px; background:var(--silver); border-radius:1px; }

/* ── SIDEBAR ── */
.sidebar {
  background:var(--dark); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto; height:calc(100vh - 50px); position:sticky; top:50px;
}
.sb-section { padding:16px 16px; border-bottom:1px solid var(--border); }
.sb-section-ch { padding:16px 16px; display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
.sb-label { font-size:0.62rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--red); margin-bottom:10px; display:block; }
.sb-field { margin-bottom:8px; }
.sb-field label { font-size:0.67rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--steel); display:block; margin-bottom:3px; }
.sb-field input {
  width:100%; background:var(--dark3); border:1px solid var(--border);
  border-radius:2px; color:var(--white); font-size:0.8rem;
  padding:7px 9px; outline:none; font-family:'Source Sans 3',sans-serif;
  transition:border-color 0.15s;
}
.sb-field input:focus { border-color:var(--red); }

/* Projects list */
.proj-list { display:flex; flex-direction:column; gap:4px; }
.proj-item {
  background:var(--dark3); border:1px solid var(--border); border-radius:2px;
  padding:9px 10px; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:space-between;
}
.proj-item:hover, .proj-item.active { border-color:var(--red); background:var(--red-dim); }
.proj-name { font-size:0.8rem; color:var(--white); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.proj-del { background:none; border:none; color:var(--steel); cursor:pointer; font-size:12px; padding:0 0 0 6px; line-height:1; }
.proj-del:hover { color:var(--red); }
.add-proj { display:flex; gap:6px; margin-top:8px; }
.add-proj input {
  flex:1; background:var(--dark3); border:1px solid var(--border);
  border-radius:2px; color:var(--white); font-size:0.8rem;
  padding:7px 9px; outline:none; font-family:'Source Sans 3',sans-serif;
}
.add-proj input:focus { border-color:var(--red); }
.add-proj button {
  background:var(--red); border:none; border-radius:2px;
  color:white; cursor:pointer; padding:7px 12px; font-size:1rem; line-height:1;
}

/* Chapter list */
.ch-list { display:flex; flex-direction:column; gap:4px; overflow-y:auto; flex:1; min-height:0; padding-bottom:4px; }
.ch-item {
  background:var(--dark3); border:1px solid var(--border); border-radius:2px;
  padding:8px 10px; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:space-between;
}
.ch-item:hover, .ch-item.active { border-color:rgba(192,57,43,0.5); background:var(--red-dim); }
.ch-item.active { border-color:var(--red); }
.ch-name { font-size:0.78rem; color:var(--white); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.ch-count { font-size:0.65rem; color:var(--steel); margin-left:6px; }
.ch-del { background:none; border:none; color:var(--steel); cursor:pointer; font-size:12px; padding:0 0 0 6px; line-height:1; }
.ch-del:hover { color:var(--red); }
.add-ch { display:flex; gap:6px; margin-top:8px; flex-shrink:0; padding-top:8px; border-top:1px solid var(--border); }
.add-ch input {
  flex:1; background:var(--dark3); border:1px solid var(--border);
  border-radius:2px; color:var(--white); font-size:0.78rem;
  padding:7px 9px; outline:none; font-family:'Source Sans 3',sans-serif;
}
.add-ch input:focus { border-color:var(--red); }
.add-ch button {
  background:var(--red); border:none; border-radius:2px;
  color:white; cursor:pointer; padding:7px 11px; font-size:1rem; line-height:1;
}

/* ── MAIN ── */
.main-area { padding:24px 28px 60px; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }
@media(max-width:600px) { .main-area { padding:14px 14px 40px; } }

.main-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:380px; gap:12px; opacity:0.25; }
.main-empty .ei { font-size:3rem; }
.main-empty p { font-size:0.85rem; color:var(--silver); }

/* Chapter editor */
.ch-editor { display:flex; flex-direction:column; gap:16px; }
.ch-ed-hdr { display:flex; align-items:center; gap:12px; padding-bottom:12px; border-bottom:2px solid var(--red); }
.ch-num { font-family:'Oswald',sans-serif; font-weight:600; font-size:1.5rem; color:var(--red); min-width:26px; }
.ch-title-inp {
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Oswald',sans-serif; font-weight:400; font-size:1.3rem;
  color:var(--white); letter-spacing:0.04em;
}
.ch-title-inp::placeholder { color:var(--border); }
.ch-desc-inp {
  width:100%; background:var(--dark3); border:1px solid var(--border);
  border-radius:2px; color:var(--silver); font-family:'Source Sans 3',sans-serif;
  font-style:italic; font-size:0.88rem; padding:9px 12px;
  resize:vertical; min-height:56px; outline:none; line-height:1.7;
}
.ch-desc-inp:focus { border-color:var(--red); }

/* Image drop */
.img-drop { border:1px dashed var(--border); border-radius:2px; padding:18px; text-align:center; transition:all 0.15s; }
.img-drop.drag-over { border-color:var(--red); background:var(--red-dim); }
.img-drop p { font-size:0.73rem; color:var(--steel); margin-bottom:10px; }
.img-drop input { display:none; }
.btn-add-img {
  background:var(--red); border:none; border-radius:2px; color:white;
  font-family:'Oswald',sans-serif; font-size:0.9rem; letter-spacing:0.1em;
  padding:9px 20px; cursor:pointer; transition:background 0.15s;
}
.btn-add-img:hover { background:var(--red2); }

/* Upload progress */
.upload-bar { display:none; background:var(--dark3); border:1px solid var(--border); border-radius:2px; padding:10px 14px; }
.upload-bar.show { display:block; }
.upload-bar-fill { height:3px; background:var(--red); border-radius:2px; transition:width 0.3s; margin-top:6px; }
.upload-bar p { font-size:0.72rem; color:var(--silver); }

/* Image grid */
.img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.img-card { position:relative; aspect-ratio:4/3; border-radius:2px; overflow:hidden; background:var(--dark3); border:1px solid var(--border); }
.img-card img { width:100%; height:100%; object-fit:cover; display:block; }
.img-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; }
.img-card:hover .img-overlay, .img-overlay.touch { background:rgba(0,0,0,0.55); }
.ov-btn { opacity:0; transition:opacity 0.15s; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.5); border-radius:2px; color:white; font-size:0.68rem; padding:3px 8px; cursor:pointer; }
.img-card:hover .ov-btn, .img-overlay.touch .ov-btn { opacity:1; }
.img-cap-bar { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.75)); padding:14px 5px 4px; font-size:0.62rem; color:rgba(255,255,255,0.85); font-style:italic; }
@media(hover:none) { .img-overlay { background:rgba(0,0,0,0.3); } .ov-btn { opacity:1; } }

/* Notification */
.notif { position:fixed; bottom:20px; right:20px; z-index:200; background:var(--dark2); border:1px solid var(--border); border-radius:3px; padding:10px 16px; font-size:0.8rem; color:var(--silver); transform:translateY(20px); opacity:0; transition:all 0.3s; pointer-events:none; }
.notif.show { transform:translateY(0); opacity:1; }
.notif.red { border-color:var(--red); color:var(--red2); }

/* Caption modal */
.modal-bg { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:var(--dark2); border:1px solid var(--border); border-radius:3px; padding:22px; width:min(360px,90vw); }
.modal h3 { font-family:'Oswald',sans-serif; font-weight:400; font-size:0.95rem; letter-spacing:0.06em; margin-bottom:12px; }
.modal textarea { width:100%; background:var(--dark3); border:1px solid var(--border); border-radius:2px; color:var(--white); font-family:'Source Sans 3',sans-serif; font-style:italic; font-size:0.85rem; padding:9px; resize:vertical; min-height:52px; outline:none; line-height:1.6; }
.modal textarea:focus { border-color:var(--red); }
.modal-btns { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
.mbtn { background:none; border:1px solid var(--border); border-radius:2px; color:var(--silver); font-size:0.75rem; padding:7px 14px; cursor:pointer; }
.mbtn:hover { border-color:var(--steel); }
.mbtn-red { background:var(--red); border-color:var(--red); color:white; }
.mbtn-red:hover { background:var(--red2); }

/* ── COMPRESSION SETTINGS ── */
.compress-settings {
  background:var(--dark3); border:1px solid var(--border); border-radius:2px;
  padding:10px 12px; margin-bottom:10px; display:flex; flex-direction:column; gap:8px;
}
.cs-row { display:flex; align-items:center; gap:8px; }
.cs-label { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--steel); min-width:70px; }
.cs-range { flex:1; -webkit-appearance:none; height:3px; background:var(--border); border-radius:2px; outline:none; cursor:pointer; }
.cs-range::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--red); cursor:pointer; }
.cs-val { font-size:0.72rem; color:var(--red); min-width:36px; text-align:right; font-family:monospace; }
.cs-select { background:var(--dark2); border:1px solid var(--border); border-radius:2px; color:var(--white); font-size:0.78rem; padding:4px 6px; outline:none; flex:1; }
.cs-input { background:var(--dark2); border:1px solid var(--border); border-radius:2px; color:var(--white); font-size:0.78rem; padding:4px 8px; outline:none; flex:1; font-family:'Source Sans 3',sans-serif; }
.cs-input:focus, .cs-select:focus { border-color:var(--red); }

/* ── PRINT ── */
.print-output { display:none; }
@media print {
  @page { size:A4 landscape; margin:0; }
  body { background:white; }
  .topbar,.app-wrap,.modal-bg,.notif { display:none !important; }
  .print-output { display:block !important; }
}

/* COVER — dark, one page */
.pc-cover {
  width:297mm; height:210mm;
  background:#141414;
  display:flex; page-break-after:always;
  position:relative; overflow:hidden;
}
.pc-left {
  width:38%; background:#0d0d0d;
  border-right:4px solid #c0392b;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:12mm 10mm;
}
.pc-right {
  flex:1; display:flex; flex-direction:column; justify-content:center;
  padding:12mm 14mm;
}
.pc-company {
  font-family:'Oswald',sans-serif; font-weight:300;
  font-size:7pt; letter-spacing:0.28em; text-transform:uppercase;
  color:#c0392b; margin-bottom:6mm;
}
.pc-divider { height:1px; background:#2a2a2a; margin-bottom:6mm; }
.pc-ch-entry { display:flex; gap:6px; font-size:6.5pt; margin-bottom:3mm; color:#555; }
.pc-ch-entry-num { color:#c0392b; font-family:'Oswald',sans-serif; min-width:16px; }
.pc-title {
  font-family:'Oswald',sans-serif; font-weight:700;
  font-size:32pt; line-height:1.05; color:#f0eeeb;
  letter-spacing:0.04em; text-transform:uppercase;
}
.pc-line { width:14mm; height:2.5px; background:#c0392b; margin:6mm 0 5mm; }
.pc-customer { font-size:8pt; color:#888; line-height:1.6; }
.pc-customer strong { color:#f0eeeb; display:block; font-weight:600; font-size:10pt; margin-bottom:1mm; }
.pc-corner {
  position:absolute; top:0; right:0;
  border-top:18mm solid #c0392b;
  border-left:18mm solid transparent;
}
.pc-date { position:absolute; bottom:6mm; right:10mm; font-size:6pt; color:#333; letter-spacing:0.15em; font-family:'Oswald',sans-serif; }

/* CHAPTER DIVIDER — light */
.pc-ch-div {
  width:297mm; height:210mm;
  background:#f5f2ec;
  display:flex; align-items:stretch;
  page-break-before:always; page-break-after:always;
  position:relative; overflow:hidden;
}
.pc-ch-sidebar {
  width:5mm; background:#c0392b; flex-shrink:0;
}
.pc-ch-content-wrap {
  flex:1; display:flex; align-items:center; padding:14mm 16mm;
  position:relative;
}
.pc-ch-bignum {
  position:absolute; right:8mm;
  font-family:'Oswald',sans-serif; font-weight:700;
  font-size:120pt; color:rgba(192,57,43,0.07); line-height:1;
  top:50%; transform:translateY(-50%);
  letter-spacing:-0.02em;
}
.pc-ch-body { z-index:1; }
.pc-ch-lbl {
  font-family:'Oswald',sans-serif; font-weight:300;
  font-size:7pt; letter-spacing:0.28em; text-transform:uppercase;
  color:#c0392b; margin-bottom:4mm;
}
.pc-ch-ttl {
  font-family:'Oswald',sans-serif; font-weight:700;
  font-size:28pt; color:#1a1a1a; line-height:1.1;
  letter-spacing:0.02em; text-transform:uppercase;
}
.pc-ch-rule { width:12mm; height:2.5px; background:#c0392b; margin:5mm 0 4mm; }
.pc-ch-desc { font-size:8.5pt; color:#666; line-height:1.7; font-style:italic; max-width:120mm; }
.pc-ch-cnt { margin-top:5mm; font-size:6.5pt; letter-spacing:0.18em; color:#aaa; text-transform:uppercase; }

/* PHOTO PAGE — white, clean */
.pc-photo {
  width:297mm; height:210mm;
  background:white;
  display:flex; flex-direction:column;
  page-break-before:always; position:relative;
  padding:8mm 10mm 11mm;
}
.pc-ph-hdr {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:4mm; padding-bottom:3mm;
  border-bottom:0.5pt solid #e0d8cc;
  flex-shrink:0;
}
.pc-ph-ch {
  font-family:'Oswald',sans-serif; font-weight:400;
  font-size:7pt; letter-spacing:0.18em; text-transform:uppercase;
  color:#c0392b;
}
.pc-ph-right { display:flex; align-items:center; gap:6mm; }
.pc-ph-brand { font-size:6.5pt; color:#bbb; letter-spacing:0.1em; font-family:'Oswald',sans-serif; text-transform:uppercase; }
.pc-ph-pg { font-size:7pt; color:#ccc; letter-spacing:0.1em; }
.pc-ph-grid { flex:1; display:grid; gap:3mm; min-height:0; }
.l1{grid-template-columns:1fr}
.l2{grid-template-columns:1fr 1fr}
.l3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.l3>div:first-child{grid-column:1/3}
.l4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.pc-iw { position:relative; overflow:hidden; background:#f0ede6; border-radius:1mm; }
.pc-iw img { width:100%; height:100%; object-fit:cover; display:block; }
.pc-cap {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.65));
  padding:8mm 3mm 2mm;
  font-size:6.5pt; color:rgba(255,255,255,0.92); font-style:italic;
}
.pc-fbar { position:absolute; bottom:0; left:0; right:0; height:2.5px; background:#c0392b; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Riedel <span>| classics</span></div>
    <div class="login-sub">Restaurations-Dokumentation</div>
    <div class="login-field">
      <label>E-Mail</label>
      <input type="email" id="loginEmail" placeholder="u.riedel@riedel-classics.de" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Passwort</label>
      <input type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Anmelden</button>
    <div class="login-err" id="loginErr">E-Mail oder Passwort falsch.</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="appWrap" style="display:none">

  <!-- Caption Modal -->
  <div class="modal-bg" id="captionModal">
    <div class="modal">
      <h3>Bildbeschriftung</h3>
      <textarea id="captionInput" placeholder="Beschreibung …"></textarea>
      <div class="modal-btns">
        <button class="mbtn" onclick="closeModal()">Abbrechen</button>
        <button class="mbtn mbtn-red" onclick="saveCaption()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="notif" id="notif"></div>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-logo">Riedel <span>| classics</span></div>
    <div class="topbar-actions">
      <button class="tbtn tbtn-red" onclick="printBook()" id="pdfBtn" disabled>🖨 PDF</button>

<script>
// ══════════════════════════════

// ══════════════════════════════
const SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_v4kXJa0y-2EHsCFPqBFHfg_QvzKLnt2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════
//  STATE
// ══════════════════════════════
let projects   = [];
let chapters   = [];
let images     = [];
let activeProjId = null;
let activeChId   = null;
let captionTarget = null; // {imgId}

// ══════════════════════════════
//  AUTH
// ══════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const {error} = await sb.auth.signInWithPassword({email, password:pw});
  if (error) {
    document.getElementById('loginErr').style.display='block';
  } else {
    showApp();
  }
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
}

async function showApp() {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  await loadProjects();
}

// Check session on load
sb.auth.getSession().then(({data:{session}}) => {
  if (session) showApp();
});

// ══════════════════════════════
//  PROJECTS
// ══════════════════════════════
async function loadProjects() {
  const {data} = await sb.from('projects').select('*').order('created_at');
  projects = data || [];
  renderProjList();
}

function renderProjList() {
  const list = document.getElementById('projList');
  list.innerHTML = '';
  projects.forEach(p => {
    const el = document.createElement('div');
    el.className = 'proj-item'+(p.id===activeProjId?' active':'');
    el.innerHTML = `<span class="proj-name">${esc(p.vehicle||p.customer||'Projekt')}</span>
      <button class="proj-del" onclick="deleteProject('${p.id}',event)">✕</button>`;
    el.addEventListener('click', ()=>openProject(p.id));
    list.appendChild(el);
  });
}

async function addProject() {
  const inp  = document.getElementById('newProjName');
  const name = inp.value.trim(); if(!name) return;
  const {data,error} = await sb.from('projects').insert({vehicle:name}).select().single();
  if (!error) { inp.value=''; projects.push(data); renderProjList(); openProject(data.id); }
}

async function deleteProject(id, e) {
  e.stopPropagation();
  if(!confirm('Projekt löschen? Alle Bilder werden entfernt.')) return;
  await sb.from('projects').delete().eq('id',id);
  projects = projects.filter(p=>p.id!==id);
  if(activeProjId===id) { activeProjId=null; resetMain(); }
  renderProjList();
}

async function openProject(id) {
  activeProjId = id;
  activeChId   = null;
  renderProjList();
  const p = projects.find(x=>x.id===id);
  document.getElementById('projFields').style.display='block';
  document.getElementById('chSection').style.display='flex';
  document.getElementById('fCustomer').value = p.customer||'';
  document.getElementById('fVehicle').value  = p.vehicle||'';
  document.getElementById('fSubtitle').value = p.subtitle||'';
  document.getElementById('pdfBtn').disabled = false;
  await loadChapters(id);
  resetMain();
  closeSidebar();
}

async function updateProject(field, val) {
  if(!activeProjId) return;
  await sb.from('projects').update({[field]:val}).eq('id',activeProjId);
  const p = projects.find(x=>x.id===activeProjId);
  if(p) p[field] = val;
  renderProjList();
}

// ══════════════════════════════
//  CHAPTERS
// ══════════════════════════════
async function loadChapters(projId) {
  const {data} = await sb.from('chapters').select('*').eq('project_id',projId).order('position');
  chapters = data||[];
  renderChList();
}

function renderChList() {
  const list = document.getElementById('chList');
  list.innerHTML='';
  chapters.forEach((ch,i) => {
    const imgCount = images.filter(x=>x.chapter_id===ch.id).length;
    const el = document.createElement('div');
    el.className='ch-item'+(ch.id===activeChId?' active':'');
    el.innerHTML=`<span class="ch-name">${esc(ch.name)}</span>
      <span class="ch-count">${imgCount}</span>
      <button class="ch-del" onclick="deleteChapter('${ch.id}',event)">✕</button>`;
    el.addEventListener('click',()=>{openChapter(ch.id);closeSidebar();});
    list.appendChild(el);
  });
}

async function addChapter() {
  const inp=document.getElementById('newChName');
  const name=inp.value.trim(); if(!name||!activeProjId) return;
  const pos=chapters.length;
  const {data,error}=await sb.from('chapters').insert({project_id:activeProjId,name,position:pos}).select().single();
  if(!error){inp.value='';chapters.push(data);renderChList();openChapter(data.id);}
}

async function deleteChapter(id,e) {
  e.stopPropagation();
  if(!confirm('Kapitel löschen?')) return;
  // delete images from storage
  const imgs=images.filter(x=>x.chapter_id===id);
  for(const img of imgs) await sb.storage.from('restauration').remove([img.storage_path]);
  await sb.from('chapters').delete().eq('id',id);
  chapters=chapters.filter(c=>c.id!==id);
  images=images.filter(x=>x.chapter_id!==id);
  if(activeChId===id){activeChId=null;resetMain();}
  renderChList();
}

async function openChapter(id) {
  activeChId=id;
  renderChList();
  // load images for this chapter if not yet loaded
  const {data}=await sb.from('images').select('*').eq('chapter_id',id).order('position');
  images=images.filter(x=>x.chapter_id!==id).concat(data||[]);
  renderChEditor(id);
}

// ══════════════════════════════
//  CHAPTER EDITOR
// ══════════════════════════════
function renderChEditor(chId) {
  const ch=chapters.find(x=>x.id===chId);
  const idx=chapters.indexOf(ch);
  const ed=document.getElementById('chEditor');
  document.getElementById('mainEmpty').style.display='none';
  ed.style.display='flex';

  ed.innerHTML=`
    <div class="ch-ed-hdr">
      <div class="ch-num">${String(idx+1).padStart(2,'0')}</div>
      <input class="ch-title-inp" value="${esc(ch.name)}" placeholder="Kapitelname"
        onchange="updateChapter('${chId}','name',this.value)">
    </div>
    <textarea class="ch-desc-inp" placeholder="Beschreibung dieser Phase …"
      onchange="updateChapter('${chId}','description',this.value)">${esc(ch.description||'')}</textarea>
    <div>
      <div style="font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);margin-bottom:8px">Bilder</div>
      <div class="compress-settings">
        <div class="cs-row">
          <span class="cs-label">Qualität</span>
          <input type="range" class="cs-range" id="quality-${chId}" min="40" max="95" value="78"
            oninput="document.getElementById('qualityVal-${chId}').textContent=this.value+'%'">
          <span class="cs-val" id="qualityVal-${chId}">78%</span>
        </div>
        <div class="cs-row">
          <span class="cs-label">Max. Breite</span>
          <select class="cs-select" id="maxW-${chId}">
            <option value="1200">1200px</option>
            <option value="1800">1800px</option>
            <option value="2400" selected>2400px</option>
            <option value="3600">Original</option>
          </select>
        </div>
        <div class="cs-row">
          <span class="cs-label">CI-Text</span>
          <input type="text" class="cs-input" id="ciText-${chId}" placeholder="z.B. Riedel Classics">
        </div>
      </div>
      <input type="file" id="fileInp-${chId}" accept="image/*" multiple style="display:none" onchange="uploadImages('${chId}',this.files)">
      <div class="img-drop" id="dz-${chId}">
        <p>JPG · PNG · HEIC — automatisch komprimiert &amp; CI-gestempelt</p>
        <button type="button" class="btn-add-img" onclick="document.getElementById('fileInp-${chId}').click()">📷 Bilder hinzufügen</button>
      </div>
      <div class="upload-bar" id="uploadBar-${chId}">
        <p id="uploadMsg-${chId}">Wird komprimiert &amp; hochgeladen…</p>
        <div class="upload-bar-fill" id="uploadFill-${chId}" style="width:0%"></div>
      </div>
    </div>
    <div class="img-grid" id="igrid-${chId}"></div>
  `;

  const dz=document.getElementById(`dz-${chId}`);
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');uploadImages(chId,e.dataTransfer.files);});

  renderImgGrid(chId);
}

async function updateChapter(id,field,val) {
  await sb.from('chapters').update({[field]:val}).eq('id',id);
  const ch=chapters.find(x=>x.id===id);
  if(ch) ch[field]=val;
  if(field==='name') renderChList();
}

// ══════════════════════════════
//  IMAGE UPLOAD
// ══════════════════════════════
// ── Compress image using Canvas
function compressImage(file, maxW, quality, ciText) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      // Resize
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // CI overlay
      if (ciText && ciText.trim()) {
        const fsize = Math.max(12, Math.round(w * 0.022));
        ctx.font = '500 ' + fsize + 'px sans-serif';
        const tw = ctx.measureText(ciText).width;
        const pad = 8, margin = Math.round(w * 0.018);
        const bx = w - margin - tw - pad*2;
        const by = h - margin - fsize - pad*2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.roundRect(bx, by, tw + pad*2, fsize + pad*2, 3);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.textBaseline = 'top';
        ctx.fillText(ciText, bx + pad, by + pad);
      }
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
    };
    img.onerror = () => resolve(file);
    img.src = url;
  });
}

async function uploadImages(chId, files) {
  const imgFiles=Array.from(files).filter(f=>f.type.startsWith('image/')||f.name.match(/\.(heic|heif)$/i));
  if(!imgFiles.length) return;

  const bar=document.getElementById(`uploadBar-${chId}`);
  const fill=document.getElementById(`uploadFill-${chId}`);
  const msg=document.getElementById(`uploadMsg-${chId}`);
  bar.classList.add('show');

  // Get compression settings
  const quality = parseInt(document.getElementById(`quality-${chId}`)?.value || 78) / 100;
  const maxW = parseInt(document.getElementById(`maxW-${chId}`)?.value || 2400);
  const ciText = document.getElementById(`ciText-${chId}`)?.value || '';

  for(let i=0;i<imgFiles.length;i++) {
    const f=imgFiles[i];
    msg.textContent=`${i+1} / ${imgFiles.length} — komprimiere ${f.name}…`;
    fill.style.width=Math.round((i/imgFiles.length)*100)+'%';

    // Compress
    const compressed = await compressImage(f, maxW, quality, ciText);
    const sizeOrig = Math.round(f.size/1024);
    const sizeNew = Math.round(compressed.size/1024);
    msg.textContent=`${i+1} / ${imgFiles.length} — ${sizeOrig}KB → ${sizeNew}KB — lade hoch…`;

    const path=`${activeProjId}/${chId}/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
    const {error:upErr}=await sb.storage.from('restauration').upload(path,compressed,{cacheControl:'3600',upsert:false,contentType:'image/jpeg'});
    if(upErr){notify('Fehler: '+f.name,'red');continue;}

    const pos=images.filter(x=>x.chapter_id===chId).length;
    const {data:imgData}=await sb.from('images').insert({chapter_id:chId,storage_path:path,position:pos,caption:''}).select().single();
    if(imgData) images.push(imgData);
    renderImgGrid(chId);
    renderChList();
  }
  fill.style.width='100%';
  msg.textContent=`✓ ${imgFiles.length} Bild${imgFiles.length!==1?'er':''} fertig`;
  setTimeout(()=>bar.classList.remove('show'),3000);
}

async function getImgUrl(path) {
  const {data}=await sb.storage.from('restauration').createSignedUrl(path,3600);
  return data?.signedUrl||'';
}

async function renderImgGrid(chId) {
  const grid=document.getElementById(`igrid-${chId}`);
  if(!grid) return;
  const chImgs=images.filter(x=>x.chapter_id===chId);
  grid.innerHTML='';
  for(const img of chImgs) {
    const url=await getImgUrl(img.storage_path);
    const card=document.createElement('div');
    card.className='img-card';
    card.innerHTML=`
      <img src="${url}" alt="" loading="lazy">
      <div class="img-overlay">
        <button class="ov-btn" onclick="openCaption('${img.id}')">✏ Text</button>
        <button class="ov-btn" onclick="deleteImage('${img.id}','${img.storage_path}','${chId}')">✕</button>
      </div>
      ${img.caption?`<div class="img-cap-bar">${esc(img.caption)}</div>`:''}
    `;
    grid.appendChild(card);
  }
}

async function deleteImage(imgId,path,chId) {
  await sb.storage.from('restauration').remove([path]);
  await sb.from('images').delete().eq('id',imgId);
  images=images.filter(x=>x.id!==imgId);
  renderImgGrid(chId);
  renderChList();
}

// ══════════════════════════════
//  CAPTION
// ══════════════════════════════
function openCaption(imgId) {
  captionTarget=imgId;
  const img=images.find(x=>x.id===imgId);
  document.getElementById('captionInput').value=img?.caption||'';
  document.getElementById('captionModal').classList.add('open');
  document.getElementById('captionInput').focus();
}
function closeModal(){ document.getElementById('captionModal').classList.remove('open'); captionTarget=null; }
async function saveCaption() {
  if(!captionTarget) return;
  const val=document.getElementById('captionInput').value.trim();
  await sb.from('images').update({caption:val}).eq('id',captionTarget);
  const img=images.find(x=>x.id===captionTarget);
  if(img){ img.caption=val; renderImgGrid(img.chapter_id); }
  closeModal();
}

// ══════════════════════════════
//  PDF / PRINT
// ══════════════════════════════
async function printBook() {
  if(!activeProjId) return;
  notify('Bilder werden geladen …');
  const p=projects.find(x=>x.id===activeProjId);
  const today=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
  const chs=chapters;
  let html='';

  // Load all images with signed URLs
  const allImgs={};
  for(const ch of chs){
    const {data}=await sb.from('images').select('*').eq('chapter_id',ch.id).order('position');
    allImgs[ch.id]=[];
    for(const img of (data||[])){
      const url=await getImgUrl(img.storage_path);
      allImgs[ch.id].push({...img,url});
    }
  }

  // Cover
  const chList=chs.map((ch,i)=>`<div class="pc-ch-entry"><span class="pc-ch-entry-num">${String(i+1).padStart(2,'0')}</span><span>${esc(ch.name)}</span></div>`).join('');
  html+=`<div class="pc-cover">
    <div class="pc-left">
      <div class="pc-company">Riedel Classics · Restaurationsdokumentation</div>
      <div class="pc-divider"></div>
      ${chList}
    </div>
    <div class="pc-right">
      <div class="pc-title">${esc(p.vehicle||'Restauration')}</div>
      <div class="pc-line"></div>
      <div class="pc-customer">${p.customer?`<strong>${esc(p.customer)}</strong>`:''} ${esc(p.subtitle||'')}</div>
    </div>
    <div class="pc-corner"></div>
    <div class="pc-date">${today}</div>
  </div>`;

  let pg=2;
  for(let ci=0;ci<chs.length;ci++){
    const ch=chs[ci];
    const imgs=allImgs[ch.id]||[];
    html+=`<div class="pc-ch-div">
      <div class="pc-ch-accent"></div>
      <div class="pc-ch-bignum">${String(ci+1).padStart(2,'0')}</div>
      <div class="pc-ch-body">
        <div class="pc-ch-lbl">Kapitel ${String(ci+1).padStart(2,'0')}</div>
        <div class="pc-ch-ttl">${esc(ch.name)}</div>
        <div class="pc-ch-rule"></div>
        ${ch.description?`<div class="pc-ch-desc">${esc(ch.description)}</div>`:''}
        <div class="pc-ch-cnt">${imgs.length} Aufnahmen</div>
      </div>
    </div>`;
    pg++;
    for(let i=0;i<imgs.length;i+=4){
      const slice=imgs.slice(i,i+4);
      const lc='l'+Math.min(slice.length,4);
      const ihtml=slice.map(img=>`<div class="pc-iw"><img src="${img.url}" alt="">${img.caption?`<div class="pc-cap">${esc(img.caption)}</div>`:''}</div>`).join('');
      html+=`<div class="pc-photo">
        <div class="pc-ph-hdr"><span class="pc-ph-ch">${esc(ch.name)}</span><span class="pc-ph-pg">— ${pg} —</span></div>
        <div class="pc-ph-grid ${lc}">${ihtml}</div>
        <div class="pc-fbar"></div>
      </div>`;
      pg++;
    }
  }
  document.getElementById('printOutput').innerHTML=html;
  setTimeout(()=>window.print(),400);
}

// ══════════════════════════════
//  UI HELPERS
// ══════════════════════════════
function resetMain(){
  document.getElementById('mainEmpty').style.display='flex';
  document.getElementById('chEditor').style.display='none';
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function notify(msg,type=''){
  const el=document.getElementById('notif');
  el.textContent=msg; el.className='notif show'+(type?' '+type:'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
